<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruit Tracker</title>
    <link rel="icon" type="image/png" href="/mcc/images/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/mcc/nav.css">
  </head>
  <body>
    <div id="nav-placeholder"></div>

    <div class="main-wrapper">
      <div class="container">
        <h1>Recruit Tracker</h1>

        <p class="dashboard-note"><span class="note-label">Note:</span> This data is not current and never gets updated. This is a snapshot of the current status of the players when the recruit request was sent.</p>

        <div class="table-scroll">
          <table id="recruit-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="/mcc/nav.js"></script>
  </body>
</html>
